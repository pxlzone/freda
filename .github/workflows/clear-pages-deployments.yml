name: Clear Pages deployment history

# Repo → Actions → this workflow → Run workflow. Safe for the live site; only trims deployment log.
on:
  workflow_dispatch:

concurrency:
  group: clear-pages-deployments
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Delete github-pages deployment records
        uses: strumwolf/delete-deployment-environment@v3.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: github-pages
          onlyRemoveDeployments: true
